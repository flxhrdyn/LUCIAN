[theme]
primaryColor = "#2ecc71"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#1a1a2e"
textColor = "#fafafa"
font = "sans serif"

[server]
maxUploadSize = 10
headless = true          # suppresses browser auto-open (required for Docker / cloud)
enableXsrfProtection = false
enableCORS = false
